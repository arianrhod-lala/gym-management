<!DOCTYPE html>
<html lang=""en"">
<head>
    <meta charset=""UTF-8"">
    <meta name=""viewport"" content=""width=device-width, initial-scale=1.0"">
    <title>Gym Admin Login</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat fixed;
            margin: 0; 
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 3rem 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 100%; max-width: 400px;
            text-align: center;
        }
        .login-logo {
            max-width: 150px;
            margin: 0 auto 1.5rem auto;
            display: block;
        }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #555; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #e53e3e; }
        button { width: 100%; padding: 0.85rem; background-color: #e53e3e; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: background 0.3s ease; }
        button:hover { background-color: #c53030; }
        #error-message { color: #e53e3e; margin-top: 1rem; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class=""login-card"">
        <img class=""login-logo"" src=""/logo.png"" alt=""WYN Fitness Logo"" onerror=""this.onerror=null;this.src='https://placehold.co/150x150/e53e3e/white?text=WYN+Gym'"" />
        <h2>Admin Portal</h2>
        <form id=""login-form"">
            <div class=""form-group"">
                <label for=""email"">Email:</label>
                <input type=""email"" id=""email"" name=""email"" required autocomplete=""username"">
            </div>
            <div class=""form-group"">
                <label for=""password"">Password:</label>
                <input type=""password"" id=""password"" name=""password"" required autocomplete=""current-password"">
            </div>
            <button type=""submit"">Log In</button>
        </form>
        <p id=""error-message""></p>
    </div>
    <script src=""/js/vendor.js"" defer></script>
    <script src=""/js/login.js"" defer></script>
</body>
</html>
